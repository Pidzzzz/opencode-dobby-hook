name: Build Dobby Hook

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26

      - name: Apply Dobby patches
        run: bash ${GITHUB_WORKSPACE}/patches/apply_patches.sh ${GITHUB_WORKSPACE}/Dobby

      - name: Configure CMake
        run: |
          mkdir -p build/${{ matrix.abi }}
          cd build/${{ matrix.abi }}
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DDOBBY_SOURCE_DIR=${GITHUB_WORKSPACE}/Dobby \
            ${GITHUB_WORKSPACE}

      - name: Build
        run: |
          cd build/${{ matrix.abi }}
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcocos2djs_hook-${{ matrix.abi }}
          path: build/${{ matrix.abi }}/libcocos2djs_hook.so
